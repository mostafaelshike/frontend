<div class="relative w-screen h-[100vh] overflow-hidden">

  <p-carousel 
      #pc
      class="w-full h-full"
      [value]="products"
      [numVisible]="1"
      [numScroll]="1"
      [circular]="true"
      [autoplayInterval]="5000"
      [showNavigators]="false"
      [showIndicators]="true"
      (onPage)="onSlideChange($event)">

      <ng-template let-product pTemplate="item">
        <div class="slide relative w-screen h-full">

          <!-- الصورة -->
          <img 
              [src]="isMobile ? product.imageMobile : product.imageDesktop"
              class="w-full h-full object-cover"
              loading="lazy"
          />

          <!-- المحتوى -->
          <div class="hero-content">
              <h1 data-aos="fade-up" data-aos-delay="100">{{ product.name }}</h1>
              <p data-aos="fade-up" data-aos-delay="300">{{ product.prgraph }}</p>
              <div class="btns" data-aos="fade-up" data-aos-delay="500">
                  <button class="shop">SHOP NOW</button>
                  <button class="find">FIND A DOCTOR</button>
              </div>
          </div>

        </div>
      </ng-template>

  </p-carousel>

</div>

<!-- الأسهم للشاشات الكبيرة -->
<button (click)="prev()" class="prev"><i class="bi bi-arrow-left-short"></i></button>
<button (click)="next()" class="next"><i class="bi bi-arrow-right-short"></i></button>

<section style="margin-top: 80px;margin-bottom: 20px;">
  <div class="container">
<div style="display: flex; justify-content: space-between;" class="section2">

  <h1>Medical category</h1>

<div style="display: flex;">
<button (click)="prevSlider2($event)" class="me-1"><i class="bi bi-arrow-left-short"></i></button>
<button (click)="nextSlider2($event)"><i class="bi bi-arrow-right-short"></i></button>
</div>

</div>

<div style="margin-top: 20px;">

  <p-carousel 
       #slider2
      class="w-full h-full"
      [value]="service"
      [numVisible]="4"
      [numScroll]="1"
      [showNavigators]="false"
     
    
      [responsiveOptions]="responsive"
     >

     <ng-template let-product pTemplate="item">
  <div class="service me-3"
       (mouseenter)="hoverService[product.id] = true"
       (mouseleave)="hoverService[product.id] = false">

    <!-- الصورة -->
    <div class="contintimg">
      <img 
          [src]="hoverService[product.id] ? product.hoverimage : product.imageDesktop"
          class="w-full h-full object-cover"
          loading="lazy"
      />
    </div>

    <!-- المحتوى -->
    <div class="category-content">
      <h1>{{ product.name }}</h1>
      <p>{{ product.prgraph }}</p>
      <div class="category-button">
        <a href="#" class="cat-button">Shop now</a>  
      </div>
    </div>

  </div>
</ng-template>


  </p-carousel>

</div>
</div>
</section>
