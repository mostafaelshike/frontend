<div class="relative w-screen h-[100vh] overflow-hidden">

 <div class="relative w-screen h-[100vh] overflow-hidden">
  <button class="prev" (click)="prevSlide()"><i class="bi bi-arrow-left-short"></i></button>
<button class="next" (click)="nextSlide()"><i class="bi bi-arrow-right-short"></i></button>
  <swiper-container
   #swiperRef
    class="w-full h-full"
    init="true"
    loop="true"
    speed="800"
    autoplay-delay="4000"
    pagination="true"
  >
    <swiper-slide *ngFor="let product of products">
      <div class="slide relative w-screen h-full">
        <!-- الصورة -->
        <img 
          [src]=" isMobile ? product.imageMobile : product.imageDesktop"
          class="w-full h-full object-cover"
          loading="lazy"
        />

        <!-- المحتوى -->
        <div class="hero-content">
          <h1 data-aos="fade-up" data-aos-delay="100">{{ product.name }}</h1>
          <p data-aos="fade-up" data-aos-delay="300">{{ product.prgraph }}</p>
          <div class="btns" data-aos="fade-up" data-aos-delay="500">
            <button class="shop">SHOP NOW</button>
            <button class="find">FIND A DOCTOR</button>
          </div>
        </div>
      </div>
    </swiper-slide>
  </swiper-container>

 
  
</div>

</div>
