<div class="banarshow">
    <div class="containt">
        <h1>Login</h1>
        <p>Home</p>
    </div>
</div>

<div class="container shop-page">
  <div class="row">
    
    <div class="col-lg-3 filter-sidebar">
      <h5 class="filter-title">Categories</h5>
      <ul class="p-0">
        <li class="category-item" 
            *ngFor="let cat of categories" 
            [class.active]="selectedCategory === cat"
            (click)="selectCategory(cat)">
          {{cat}}
          <i class="bi bi-chevron-right small"></i>
        </li>
      </ul>

      <hr class="my-4">

      <h5 class="filter-title">Price Filter</h5>
      <div class="price-box">
        <div class="row g-2">
          <div class="col-6">
            <label class="small text-muted">Min</label>
            <input type="number" [(ngModel)]="minPrice" (input)="applyFilters()">
          </div>
          <div class="col-6">
            <label class="small text-muted">Max</label>
            <input type="number" [(ngModel)]="maxPrice" (input)="applyFilters()">
          </div>
        </div>
        <button class="btn w-100 mt-3 text-white" 
                style="background-color: #31af68;" 
                (click)="applyFilters()">
          Filter Now
        </button>
        <button class="btn btn-link btn-sm w-100 mt-1 text-muted text-decoration-none" (click)="resetFilters()">
          Reset All
        </button>
      </div>
    </div>

    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <p class="mb-0 text-muted">Showing <b>{{filteredProducts.length}}</b> products</p>
        <select class="form-select w-auto border-0 bg-light">
          <option>Sort by: Newest</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md-4 col-sm-6 mb-4" *ngFor="let product of filteredProducts">
          <div class="card product-card">
            <div class="image-wrapper">
              <img [src]="product.images[0] || 'assets/placeholder.png'" alt="{{product.name}}">
            </div>
            <div class="card-body">
              <p class="small text-uppercase text-muted mb-1" style="font-size: 0.7rem;">{{product.category}}</p>
              <h6 class="product-name text-truncate">{{product.name}}</h6>
              <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="product-price">${{product.price}}</span>
                <button class="btn btn-add btn-sm">
                  <i class="bi bi-plus-lg"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <div class="col-12 text-center py-5" *ngIf="filteredProducts.length === 0">
          <i class="bi bi-search display-1 text-muted"></i>
          <p class="mt-3">No products found matching your criteria.</p>
        </div>
      </div>
    </div>

  </div>
</div>
