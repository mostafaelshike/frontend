<div class="banarshow">
    <div class="containt">
        <h1>Login</h1>
        <p>Home</p>
    </div>
</div>

<div class="container py-5">
  <div class="row">
    <div class="col-md-3">
      <h5 class="fw-bold mb-3" style="color: #31af68;">Categories</h5>
      <ul class="list-group mb-4 shadow-sm">
        <li *ngFor="let cat of categories" 
            (click)="selectCategory(cat)"
            class="list-group-item list-group-item-action border-0 d-flex justify-content-between align-items-center"
            [ngStyle]="{'background-color': selectedCategory === cat ? '#31af6820' : 'transparent', 'color': selectedCategory === cat ? '#31af68' : '#333'}"
            style="cursor: pointer;">
          {{cat}}
          <span *ngIf="selectedCategory === cat" class="badge rounded-pill" style="background-color: #31af68;">✓</span>
        </li>
      </ul>

      <h5 class="fw-bold mb-3" style="color: #31af68;">Price Range</h5>
      <div class="bg-light p-3 rounded shadow-sm">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <input type="number" class="form-control form-control-sm" placeholder="Min" [(ngModel)]="minPrice" (input)="applyFilters()">
          </div>
          <div class="col-6">
            <input type="number" class="form-control form-control-sm" placeholder="Max" [(ngModel)]="maxPrice" (input)="applyFilters()">
          </div>
        </div>
        <button class="btn btn-sm w-100 text-white" style="background-color: #31af68;" (click)="resetFilters()">Clear Filters</button>
      </div>
    </div>

    <div class="col-md-9">
      <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h4 class="fw-bold">{{selectedCategory || 'Our Products'}}</h4>
        <span class="text-muted">Found {{filteredProducts.length}} items</span>
      </div>

      <div class="row">
        <div class="col-lg-4 col-md-6 mb-4" *ngFor="let product of filteredProducts">
          <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="bg-white d-flex align-items-center justify-content-center p-3" style="height: 200px;">
              <img [src]="product.images && product.images[0] ? product.images[0] : 'assets/placeholder.jpg'" 
                   class="img-fluid h-100" 
                   style="object-fit: contain;" 
                   alt="{{product.name}}">
            </div>
            <div class="card-body bg-light text-center">
              <p class="text-muted small mb-1">{{product.category}}</p>
              <h6 class="card-title text-truncate fw-bold">{{product.name}}</h6>
              <p class="h5 mt-2" style="color: #31af68;">{{product.price}} جنيه</p>
              <button class="btn btn-outline-success btn-sm w-100 mt-2 rounded-pill" style="border-color: #31af68; color: #31af68;">View Details</button>
            </div>
          </div>
        </div>

        <div class="col-12 text-center py-5" *ngIf="filteredProducts.length === 0">
          <h5 class="text-muted">No products found for this filter.</h5>
        </div>
      </div>
    </div>
  </div>
</div>
