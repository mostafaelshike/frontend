<div class="banarshow">
  <div class="containt">
    <h1>Shop</h1>
    <p>Home</p>
  </div>
</div>

<div class="container py-5">
  <div class="row">

    <!-- ========= Categories ========= -->
    <div class="col-lg-3">
      <div class="p-4 bg-white shadow-sm rounded-4 border">
        <h5 class="fw-bold mb-4" style="color: #31af68;">Categories</h5>

        <div
          class="cat-item d-flex justify-content-between align-items-center"
          (click)="selectCategory('')"
          [class.cat-active]="selectedCategory === ''">
          <span>All Products</span>
          <i class="bi bi-collection"></i>
        </div>

        <div
          *ngFor="let cat of categories"
          class="cat-item d-flex justify-content-between align-items-center"
          (click)="selectCategory(cat)"
          [class.cat-active]="selectedCategory === cat">
          {{ cat }}
          <i *ngIf="selectedCategory === cat" class="bi bi-check2"></i>
        </div>

        <hr class="my-4 opacity-25">

        <!-- ========= Price ========= -->
        <h5 class="fw-bold mb-3" style="color: #31af68;">Price Filter</h5>
        <div class="row g-2">
          <div class="col-6">
            <input
              type="number"
              class="form-control form-control-sm"
              placeholder="Min"
              [(ngModel)]="minPrice"
              (input)="applyFilters()">
          </div>
          <div class="col-6">
            <input
              type="number"
              class="form-control form-control-sm"
              placeholder="Max"
              [(ngModel)]="maxPrice"
              (input)="applyFilters()">
          </div>
        </div>

        <button
          class="btn btn-sm w-100 mt-3 text-white rounded-pill"
          style="background-color:#31af68"
          (click)="resetFilters()">
          Reset
        </button>
      </div>
    </div>

    <!-- ========= Products ========= -->
    <div class="col-lg-9">
      <img
        src="assets/collection-banner (1).webp"
        style="width:100%;height:200px;border-radius:20px">

      <div class="row g-4 mt-4">
        <div
          class="col-md-4 col-sm-6"
          *ngFor="let product of filteredProducts">

          <div class="mini-product-card">

            <div class="mini-img-container">
              <img
                [src]="product.images[0]"
                class="mini-img main-img">

              <img
                *ngIf="product.images.length > 1"
                [src]="product.images[1]"
                class="mini-img hover-img">

              <!-- 👁️ Eye only -->
              <div class="icon-card">
                <!-- 👁️ -->
                <div class="eye-icon" (click)="openQuickView(product)">
                  <i class="bi bi-eye"></i>
                </div>

                <!-- 🛒 شكل فقط -->
                <div class="bag-icon">
                  <i class="bi bi-bag-dash"></i>
                </div>
              </div>
            </div>

            <div class="mini-card-body d-flex justify-content-between mt-3" >
              <div >
                <h6 class="mini-product-name">{{ product.name }}</h6>
                <div class="mini-price">
                  {{ product.price | number }} EGP
                </div>
              </div>
                <div class="details-icon"> <i class="bi bi-bag-dash"></i> </div>
              
            </div>

          </div>
        </div>
      </div>

      <!-- ========= Empty ========= -->
      <div class="text-center py-5" *ngIf="filteredProducts.length === 0">
        <i class="bi bi-search display-1 text-muted opacity-25"></i>
        <h4 class="mt-3 text-muted">No products found</h4>
      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->
 <div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body p-4">

        <div class="row">

          <!-- الصورة الكبيرة + Thumbnails -->
          <div class="col-md-6 text-center">

            <!-- الصورة الكبيرة -->
            <img 
              [src]="selectedProduct?.images[selectedImageIndex]" 
              class="d-block w-100 rounded mb-2" 
              style="max-height:420px; object-fit:cover"
            >

            <!-- الصور المصغرة -->
            <div class="d-flex justify-content-center gap-2 mt-2">
              <img 
                *ngFor="let img of selectedProduct?.images; let i = index"
                [src]="img"
                (click)="selectedImageIndex = i"
                [class.border]="selectedImageIndex === i"
                style="width:60px; height:60px; object-fit:cover; cursor:pointer; border-radius:4px;"
              >
            </div>
          </div>

          <!-- التفاصيل -->
          <div class="col-md-6">
            <h4>{{ selectedProduct?.name }}</h4>
            <p class="text-danger fs-5">
              {{ selectedProduct?.price | number }} EGP
            </p>

            <hr>

            <p>
              Category: <strong>{{ selectedProduct?.category }}</strong>
            </p>

            <p>
              Collection: <strong>{{ selectedProduct?.subcategory }}</strong>
            </p>

            <!-- لو حبيت تضيف شراء ممكن تحطه هنا -->
          </div>

        </div>

      </div>
    </div>
  </div>
</div>
