<div class="container-fluid container-lg mt-4 mt-md-5">
  <div class="header-section d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-4 gap-3">
    <h2 class="fw-bold m-0 text-dark fs-4 fs-md-2">
      <i class="bi bi-box-seam text-primary me-2"></i>لوحة التحكم: المنتجات
    </h2>
    <button class="btn btn-primary add-btn shadow-sm px-4 py-2 fw-bold w-100 w-sm-auto" (click)="createProduct()">
      <i class="bi bi-plus-lg me-1"></i> إضافة منتج جديد
    </button>
  </div>

  <div *ngIf="loading" class="loader-container text-center my-5 py-5">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    <p class="mt-3 text-muted fw-medium">جاري جلب المنتجات...</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger border-0 shadow-sm rounded-3">
    <i class="bi bi-exclamation-triangle-fill fs-5 me-2"></i>
    <span>{{ errorMessage }}</span>
  </div>

  <div class="card shadow-sm border-0 rounded-4 overflow-hidden" *ngIf="!loading && products.length">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0 text-center custom-table">
        <thead class="table-dark d-none d-md-table-header-group">
          <tr>
            <th class="py-3">الصورة</th>
            <th class="py-3">الاسم</th>
            <th class="py-3">الفئة</th>
            <th class="py-3">السعر</th>
            <th class="py-3">التحكم</th>
          </tr>
        </thead>
        <tbody class="d-block d-md-table-row-group">
          <tr *ngFor="let product of products" class="d-block d-md-table-row mb-3 mb-md-0 border-bottom">
            <td class="py-3 d-block d-md-table-cell">
              <img
                [src]="getImageUrl(product.images[0])"
                alt="product"
                class="rounded-3 border shadow-sm product-img"
                onerror="this.src='assets/no-image.png';"
              />
            </td>
            <td class="fw-bold text-secondary d-block d-md-table-cell py-2 py-md-3">
              <span class="d-md-none text-muted small fw-normal d-block">الاسم:</span>
              {{ product.name }}
            </td>
            <td class="d-block d-md-table-cell py-2 py-md-3">
              <span class="d-md-none text-muted small fw-normal d-block mb-1">الفئة:</span>
              <span class="badge rounded-pill bg-light text-dark border px-3 py-2">
                {{ product.category }}
              </span>
            </td>
            <td class="text-success fw-bold d-block d-md-table-cell py-2 py-md-3">
              <span class="d-md-none text-muted small fw-normal d-block">السعر:</span>
              {{ product.price | currency:'EGP ':'symbol':'1.0-0' }}
            </td>
            <td class="d-block d-md-table-cell py-3 py-md-3">
              <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-sm btn-outline-primary rounded-3 px-3 flex-grow-1 flex-md-grow-0" (click)="editProduct(product._id)">
                  <i class="bi bi-pencil-square"></i> تعديل
                </button>
                <button class="btn btn-sm btn-danger rounded-3 px-3 shadow-sm flex-grow-1 flex-md-grow-0" (click)="deleteProduct(product._id)">
                  <i class="bi bi-trash3"></i> حذف
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="!loading && products.length === 0" class="empty-state text-center py-5 bg-white shadow-sm rounded-4 mt-3">
    <img src="assets/empty-box.png" alt="No data" class="img-fluid mb-3" style="max-width: 100px; opacity: 0.6;">
    <h4 class="mt-3 text-muted">لا توجد منتجات حالياً</h4>
    <button class="btn btn-outline-primary mt-2" (click)="createProduct()">إضافة منتج</button>
  </div>
</div>
