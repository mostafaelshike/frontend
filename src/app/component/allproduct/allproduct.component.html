<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0"><i class="bi bi-box-seam me-2"></i>إدارة المنتجات</h2>
    <button class="btn btn-success fw-bold px-4 py-2 shadow-sm" (click)="createProduct()">
      <i class="bi bi-plus-lg me-1"></i> إضافة منتج جديد
    </button>
  </div>

  <div *ngIf="loading" class="text-center my-5 py-5">
    <div class="spinner-border text-success" role="status"></div>
    <p class="mt-2 text-muted">جاري تحميل قائمة المنتجات...</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0">
    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
  </div>

  <div class="table-responsive shadow rounded-4 overflow-hidden" *ngIf="!loading && products.length">
    <table class="table table-hover align-middle m-0 text-center">
      <thead class="bg-dark text-white">
        <tr>
          <th class="py-3">الصورة</th>
          <th class="py-3">الاسم</th>
          <th class="py-3">الفئة</th>
          <th class="py-3">السعر</th>
          <th class="py-3">الخيارات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td class="py-3">
            <img
              [src]="getImageUrl(product.images[0])"
              alt="{{ product.name }}"
              class="rounded-3 border shadow-sm img-thumbnail"
              style="width: 65px; height: 65px; object-fit: cover;"
            />
          </td>
          <td class="fw-bold text-dark">{{ product.name }}</td>
          <td><span class="badge bg-light text-dark border px-3 py-2">{{ product.category }}</span></td>
          <td class="text-success fw-bold">{{ product.price | currency:'EGP ':'symbol':'1.0-0' }}</td>
          <td>
            <div class="d-flex justify-content-center gap-2">
              <button class="btn btn-sm btn-outline-primary px-3" (click)="editProduct(product._id)">
                <i class="bi bi-pencil-square"></i> تعديل
              </button>
              <button class="btn btn-sm btn-outline-danger px-3" (click)="deleteProduct(product._id)">
                <i class="bi bi-trash"></i> حذف
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && products.length === 0" class="text-center py-5 bg-light rounded-4 shadow-sm">
    <i class="bi bi-folder-x fs-1 text-muted"></i>
    <p class="mt-3 text-muted fs-5">لا توجد منتجات مسجلة في المتجر حالياً.</p>
  </div>
</div>
