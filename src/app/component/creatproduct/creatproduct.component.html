<div class="container my-5">
   <div class="card shadow-lg p-4 border-0 rounded-4">
  <h2 class="text-center mb-4" >إنشاء منتج جديد</h2>

  <form (ngSubmit)="onSubmit()" enctype="multipart/form-data" class="needs-validation" novalidate>

    <!-- اسم المنتج -->
    <div class="mb-3">
      <label class="form-label">اسم المنتج</label>
      <input type="text" class="form-control " [(ngModel)]="product.name" name="name" required>
    </div>

    <!-- الوصف -->
    <div class="mb-3">
      <label class="form-label">الوصف</label>
      <textarea class="form-control " [(ngModel)]="product.description" name="description" rows="3" required></textarea>
    </div>

    <!-- السعر -->
    <div class="mb-3">
      <label class="form-label">السعر</label>
      <input type="number" class="form-control " [(ngModel)]="product.price" name="price" min="0" required>
    </div>

    <!-- القسم -->
    <div class="mb-3">
      <label class="form-label">القسم</label>
      <select class="form-select " [(ngModel)]="product.category" name="category" required>
        <option value="" disabled selected>اختر القسم</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>

    <!-- حالة المنتج (اختياري) -->
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" [(ngModel)]="product.inStock" name="inStock" id="inStock">
      <label class="form-check-label" for="inStock">المنتج متوفر في المخزن</label>
    </div>

    <!-- الصور -->
    <div class="mb-3">
      <label class="form-label">صور المنتج (حتى 4 صور)</label>
      <input type="file" class="form-control " (change)="onFileChange($event)" multiple accept="image/*">
      <small class="text-muted">يمكنك رفع حتى 4 صور فقط.</small>

      <!-- عرض الصور قبل الإرسال -->
      <div class="mt-3 d-flex flex-wrap gap-3" *ngIf="previewUrls.length > 0">
        <div *ngFor="let url of previewUrls; let i = index" class="border rounded p-2 text-center" style="width:120px;">
          <img [src]="url" width="100" height="100" class="rounded mb-2" alt="صورة المنتج">
          <p class="small text-muted text-truncate" style="max-width:100px">{{ selectedFiles[i].name }}</p>
          <button type="button" class="btn btn-sm " (click)="removePreview(i)">حذف</button>
        </div>
      </div>
    </div>

    <!-- زر الإنشاء -->
    <button type="submit" class="btn  w-100 " >
      إنشاء المنتج
    </button>
  </form>
</div>
</div>
