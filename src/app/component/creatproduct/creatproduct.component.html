<div class="banarshow">
    <div class="containt">
        <h1>إنشاء منتج</h1>
        <p>الرئيسية / منتج جديد</p>
    </div>
</div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-sm p-4 border-0 rounded-4">
                <h2 class="text-center mb-4 fw-bold">إنشاء منتج جديد</h2>

                <form (ngSubmit)="onSubmit()" enctype="multipart/form-data" class="needs-validation" novalidate>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">اسم المنتج</label>
                            <input type="text" class="form-control custom-input" [(ngModel)]="product.name" name="name" placeholder="مثلاً: ساعة ذكية" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">السعر</label>
                            <input type="number" class="form-control custom-input" [(ngModel)]="product.price" name="price" min="0" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">الوصف</label>
                        <textarea class="form-control custom-input" [(ngModel)]="product.description" name="description" rows="3" placeholder="اكتب تفاصيل المنتج هنا..." required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">القسم</label>
                        <select class="form-select custom-input" [(ngModel)]="product.category" name="category" required>
                            <option value="" disabled selected>اختر القسم</option>
                            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                        </select>
                    </div>

                    <div class="mb-4 form-check form-switch">
                        <input type="checkbox" class="form-check-input" [(ngModel)]="product.inStock" name="inStock" id="inStock">
                        <label class="form-check-label ms-2" for="inStock">المنتج متوفر حالياً في المخزن</label>
                    </div>

                    <div class="mb-4 upload-section p-3 border rounded-3 bg-light">
                        <label class="form-label fw-bold">صور المنتج (حتى 4 صور)</label>
                        <input type="file" class="form-control" (change)="onFileChange($event)" multiple accept="image/*">
                        <div class="form-text text-muted">يفضل استخدام صور عالية الجودة.</div>

                        <div class="mt-3 d-flex flex-wrap gap-2 justify-content-center" *ngIf="previewUrls.length > 0">
                            <div *ngFor="let url of previewUrls; let i = index" class="preview-card">
                                <img [src]="url" class="img-preview" alt="صورة المنتج">
                                <button type="button" class="btn-remove" (click)="removePreview(i)">
                                    <i class="bi bi-x"></i> ×
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit w-100 py-2 fs-5">
                        حفظ ونشر المنتج
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
