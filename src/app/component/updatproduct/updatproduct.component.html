<div class="container py-5">
  <div class="card shadow-lg p-4 border-0 rounded-4">

    <h2 class="text-center mb-4 fw-bold ">تعديل المنتج</h2>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">

      <!-- اسم المنتج -->
      <div class="mb-3">
        <label class="form-label fw-semibold">اسم المنتج</label>
        <input
          type="text"
          class="form-control "
          formControlName="name">
      </div>

      <!-- السعر -->
      <div class="mb-3">
        <label class="form-label fw-semibold">السعر</label>
        <input
          type="number"
          class="form-control "
          formControlName="price">
      </div>

      <!-- الوصف -->
      <div class="mb-3">
        <label class="form-label fw-semibold">الوصف</label>
        <textarea
          class="form-control "
          rows="3"
          formControlName="description"></textarea>
      </div>

      <!-- القسم -->
      <div class="mb-3">
        <label class="form-label fw-semibold">القسم</label>
        <select
          class="form-select"
          formControlName="category">
          <option value="" disabled>اختر القسم</option>
          <option *ngFor="let cat of categories" [value]="cat">
            {{ cat }}
          </option>
        </select>
      </div>

      <!-- متوفر -->
      <div class="mb-4 form-check">
        <input
          class="form-check-input"
          type="checkbox"
          formControlName="inStock"
          id="inStock">
        <label class="form-check-label fw-semibold" for="inStock">
          متوفر في المخزن
        </label>
      </div>

      <!-- الصور -->
      <div class="mb-3">
        <label class="form-label fw-semibold">
          صور المنتج (حد أقصى 4)
        </label>
        <input
          type="file"
          class="form-control"
          multiple
          accept="image/*"
          (change)="onFileChange($event)">
      </div>

      <!-- معاينة الصور -->
      <div class="mb-4 d-flex flex-wrap gap-3">
        <div
          *ngFor="let img of previewImages; let i = index"
          class="border rounded-3 p-2 position-relative">
          <img
            [src]="img"
            width="100"
            height="100"
            class="rounded"
            alt="صورة المنتج">
          <button
            type="button"
            class="btn-close position-absolute top-0 end-0"
            (click)="removeExistingImage(i)">
          </button>
        </div>
      </div>

      <!-- زر التحديث -->
      <button
        class="btn  w-100 py-2 fw-bold"
        [disabled]="loading">
        {{ loading ? 'جارٍ التحديث...' : 'تحديث المنتج' }}
      </button>

    </form>
  </div>
</div>
