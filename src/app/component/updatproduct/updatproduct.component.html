<div class="banarshow">
    <div class="containt">
        <h1>تعديل المنتج</h1>
        <p>الرئيسية / تعديل</p>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-lg p-4 border-0 rounded-4">
                <h2 class="text-center mb-4 fw-bold">تعديل بيانات المنتج</h2>

                <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">اسم المنتج</label>
                            <input type="text" class="form-control custom-input" formControlName="name" placeholder="اسم المنتج">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">السعر</label>
                            <input type="number" class="form-control custom-input" formControlName="price" placeholder="0.00">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">الوصف</label>
                        <textarea class="form-control custom-input" rows="3" formControlName="description" placeholder="وصف تفصيلي للمنتج..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">القسم</label>
                        <select class="form-select custom-input" formControlName="category">
                            <option value="" disabled>اختر القسم</option>
                            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                        </select>
                    </div>

                    <div class="mb-4 form-check form-switch">
                        <input class="form-check-input" type="checkbox" formControlName="inStock" id="inStock">
                        <label class="form-check-label fw-semibold ms-2" for="inStock">المنتج متوفر حالياً في المخزن</label>
                    </div>

                    <div class="mb-3 upload-box p-3 border rounded-3 bg-light text-center">
                        <label class="form-label fw-semibold d-block">تحديث الصور (سيتم استبدال الصور الجديدة بالقديمة المختارة)</label>
                        <input type="file" class="form-control" multiple accept="image/*" (change)="onFileChange($event)">
                        
                        <div class="mt-3 d-flex flex-wrap gap-3 justify-content-center">
                            <div *ngFor="let img of previewImages; let i = index" class="preview-container position-relative">
                                <img [src]="img" class="img-thumbnail" style="width: 100px; height: 100px; object-fit: cover;">
                                <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 rounded-circle" (click)="removeExistingImage(i)" style="padding: 0px 6px;">
                                    &times;
                                </button>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2 fw-bold fs-5 mt-3" [disabled]="loading || productForm.invalid" style="background-color: #31af68; border: none;">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                        {{ loading ? 'جارٍ التحديث...' : 'حفظ التعديلات' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
